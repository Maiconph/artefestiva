<!-- ========================================== -->
<!-- SESSÃO: FORMULÁRIO DE CADASTRO DE SUPORTES -->
<!-- ========================================== -->
<div class="space-y-6 animate-fade-in">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    
    <!-- Nome do Suporte -->
    <div class="flex flex-col space-y-2 md:col-span-2">
      <label class="text-xs uppercase font-bold text-slate-400 ml-1">Nome do Suporte</label>
      <input [(ngModel)]="novaBoleira.nome" type="text" placeholder="Ex: Boleira de Cerâmica Branca" 
             class="bg-slate-900 border border-slate-700 text-white rounded-2xl p-4 outline-none text-sm placeholder-slate-600 focus:border-blue-500 transition-colors">
    </div>

    <!-- Tamanho e Cor -->
    <div class="flex flex-col space-y-2">
      <label class="text-xs uppercase font-bold text-slate-400 ml-1">Tamanho (Ex: 30cm)</label>
      <input [(ngModel)]="novaBoleira.tamanho" type="text" placeholder="30cm" 
             class="bg-slate-900 border border-slate-700 text-white rounded-2xl p-4 outline-none text-sm placeholder-slate-600 focus:border-blue-500 transition-colors">
    </div>

    <div class="flex flex-col space-y-2">
      <label class="text-xs uppercase font-bold text-slate-400 ml-1">Cor</label>
      <input [(ngModel)]="novaBoleira.cor" type="text" placeholder="Ex: Dourado" 
             class="bg-slate-900 border border-slate-700 text-white rounded-2xl p-4 outline-none text-sm placeholder-slate-600 focus:border-blue-500 transition-colors">
    </div>

    <!-- Valor -->
    <div class="flex flex-col space-y-2">
      <label class="text-xs uppercase font-bold text-slate-400 ml-1">Valor de Locação (R$)</label>
      <input [(ngModel)]="novaBoleira.valorLocacao" type="number" placeholder="0.00" 
             class="bg-slate-900 border border-slate-700 text-white rounded-2xl p-4 outline-none text-sm placeholder-slate-600 focus:border-blue-500 transition-colors">
    </div>

    <div class="flex flex-col space-y-2">
      <label class="text-xs uppercase font-bold text-slate-400 ml-1">Foto do Suporte</label>
      <input type="file" (change)="onFileSelected($event)" class="block w-full text-sm text-slate-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-bold file:uppercase file:bg-slate-700 file:text-white file:cursor-pointer hover:file:bg-slate-600 transition-all">
    </div>
  </div>

  <button (click)="salvar()" [disabled]="loading" 
          class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-600 text-white py-4 rounded-2xl uppercase text-sm font-bold shadow-lg transition-all mt-2 mb-12">
    {{ loading ? 'Processando...' : 'Salvar Suporte no Inventário' }}
  </button>

  <div class="pt-8 border-t border-slate-700/80">
    <h3 class="text-xl font-bold text-white tracking-tight mb-6">Suportes Cadastrados</h3>
    
    <div *ngIf="(boleiras$ | async)?.length === 0" class="text-center py-10 text-slate-500 text-sm">Nenhum suporte cadastrado no acervo.</div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
      <div *ngFor="let boleira of boleiras$ | async" class="bg-slate-800/60 border border-slate-700 rounded-2xl p-4 hover:border-slate-600 transition-all shadow-sm flex flex-col sm:flex-row gap-4">
        
        <div class="w-full sm:w-32 h-32 shrink-0 bg-slate-900 rounded-xl border border-slate-700 overflow-hidden flex items-center justify-center">
          <img *ngIf="boleira.imagemUrl" [src]="boleira.imagemUrl" class="w-full h-full object-cover">
          <span *ngIf="!boleira.imagemUrl" class="text-[10px] text-slate-500 uppercase font-bold text-center p-2">Sem Foto</span>
        </div>

        <div class="flex-1 flex flex-col gap-3">
          <div>
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-1">Nome do Suporte</label>
            <input [(ngModel)]="boleira.nome" type="text" class="bg-slate-900 border border-slate-700 text-white rounded-xl p-2 outline-none text-xs w-full focus:border-blue-500 transition-colors">
          </div>
          
          <div class="grid grid-cols-3 gap-2">
            <div>
              <label class="text-[10px] uppercase font-bold text-slate-400 ml-1">Tam.</label>
              <input [(ngModel)]="boleira.tamanho" type="text" class="bg-slate-900 border border-slate-700 text-white rounded-xl p-2 outline-none text-xs w-full focus:border-blue-500 transition-colors">
            </div>
            <div>
              <label class="text-[10px] uppercase font-bold text-slate-400 ml-1">Cor</label>
              <input [(ngModel)]="boleira.cor" type="text" class="bg-slate-900 border border-slate-700 text-white rounded-xl p-2 outline-none text-xs w-full focus:border-blue-500 transition-colors">
            </div>
            <div>
              <label class="text-[10px] uppercase font-bold text-slate-400 ml-1">Valor</label>
              <input [(ngModel)]="boleira.valorLocacao" type="number" class="bg-slate-900 border border-slate-700 text-white rounded-xl p-2 outline-none text-xs w-full focus:border-blue-500 transition-colors">
            </div>
          </div>

          <div class="flex gap-2 mt-auto pt-2">
            <button (click)="atualizar(boleira)" [disabled]="loading" class="flex-1 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase transition-colors">Salvar</button>
            <button (click)="excluir(boleira.id!, boleira.nome)" [disabled]="loading" class="bg-transparent border border-red-500/30 text-red-400 hover:bg-red-500/10 disabled:bg-slate-800 px-3 py-2 rounded-lg text-[10px] font-bold uppercase transition-colors">Excluir</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
